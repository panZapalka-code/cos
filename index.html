<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Identyfikatorów</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #0f172a; 
            color: white; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        label {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 5px;
            display: block;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 6px; 
            border: 1px solid #444; 
            background: #334155; 
            color: white; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #8b5cf6; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background: #7c3aed;
        }

        /* Wygląd wygenerowanej karty */
        .badge { 
            width: 100%; 
            max-width: 320px; 
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
            padding: 30px 20px; 
            border-radius: 15px; 
            text-align: center; 
            display: none; /* Ukryte do momentu wygenerowania */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
            box-sizing: border-box;
        }
        .badge img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid white; 
            margin-bottom: 15px; 
            background: #cbd5e1; 
        }
        .badge h2 { 
            margin: 0 0 5px 0; 
            font-size: 1.6em; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .badge p { 
            margin: 0; 
            opacity: 0.9; 
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </script>
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin-top: 0;">Kreator Identyfikatora</h2>
        <form id="badgeForm">
            <label>Imię i nazwisko / Nick</label>
            <input type="text" id="inputName" placeholder="np. Jan Kowalski" required>
            
            <label>Rola na wydarzeniu</label>
            <input type="text" id="inputRole" placeholder="np. VIP, Gracz, Gość" required>
            
            <label>Zdjęcie profilowe</label>
            <input type="file" id="inputFile" accept="image/*" capture="environment" required>
            
            <button type="submit">Generuj Kartę</button>
        </form>
    </div>

    <div class="badge" id="badgePreview">
        <img id="badgeImage" src="" alt="Awatar">
        <h2 id="badgeName">Imię</h2>
        <p id="badgeRole">Rola</p>
    </div>

    <script>
        const form = document.getElementById('badgeForm');
        const badgePreview = document.getElementById('badgePreview');
        const badgeImage = document.getElementById('badgeImage');
        const badgeName = document.getElementById('badgeName');
        const badgeRole = document.getElementById('badgeRole');
        const inputFile = document.getElementById('inputFile');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Blokujemy przeładowanie strony

            // Przepisanie tekstu z formularza do karty
            badgeName.textContent = document.getElementById('inputName').value;
