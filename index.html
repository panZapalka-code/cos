<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Danych</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --bg-base: #0f172a; --text-main: #f8fafc; --primary: #8b5cf6; --secondary: #3b82f6; --border-color: rgba(255, 255, 255, 0.08); --glass-bg: rgba(30, 41, 59, 0.7); --input-bg: rgba(15, 23, 42, 0.6); --error-red: #ef4444; --success-green: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 1200px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; }
        h1 { font-size: 2.6rem; font-weight: 800; text-align: center; background: linear-gradient(135deg, #a78bfa, #60a5fa); background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; color: white; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JatrogzzObywatel</h1>
        <form id="dataGenerator">
            <div class="form-group"><label>Imię</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Nazwisko</label><input type="text" name="surname" required></div>
            <div class="form-group"><label>PESEL</label><input type="text" name="pesel" maxlength="11" required></div>
            <button type="submit" id="generateButton">GENERUJ DANE</button>
        </form>
    </div>
    <script>
        document.getElementById('dataGenerator').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Działa! Teraz dodaj resztę swojego kodu tutaj.');
        });
    </script>
</body>
</html>
