<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f172a; color: white; }
        .container { max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #1e293b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #8b5cf6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #fileInput { margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Generator</h1>
    <form id="dataGenerator">
        <div class="form-group">
            <label>Imię</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Nazwisko</label>
            <input type="text" id="surname" required>
        </div>
        <div class="form-group">
            <label>Data urodzenia</label>
            <input type="date" id="birthday" required>
        </div>
        <button type="button" id="autofillButton">Wypełnij daty</button>
        
        <div class="form-group">
            <label>Zdjęcie</label>
            <input type="file" id="fileInput" accept="image/*" capture="environment">
        </div>

        <button type="submit" id="generateButton">GENERUJ</button>
    </form>
    <p id="status"></p>
</div>

<script>
    const autofillButton = document.getElementById('autofillButton');
    const birthdayInput = document.getElementById('birthday');
    const status = document.getElementById('status');

    autofillButton.addEventListener('click', function() {
        if(!birthdayInput.value) {
            alert('Wybierz datę urodzenia!');
            return;
        }
        status.textContent = "Daty wygenerowane!";
    });

    document.getElementById('dataGenerator').addEventListener('submit', function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('fileInput');
        
        if (fileInput.files.length === 0) {
            alert('Dodaj zdjęcie!');
            return;
        }

        status.textContent = "Wysyłanie...";
        // Tutaj będzie reszta Twojej logiki wysyłania
    });
</script>

</body>
</html>
